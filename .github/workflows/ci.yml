name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: qpay-sdk/qpay-java
          path: qpay-java
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install qpay-java locally
        run: cd qpay-java && mvn -B install -DskipTests -Dgpg.skip=true
      - name: Build and test
        run: mvn -B verify
